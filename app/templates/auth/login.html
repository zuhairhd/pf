{% extends "base.html" %}

{% block title %}Login - PF AI{% endblock %}
{% block page_title %}Authentication{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center min-vh-100">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow-lg">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <i class="bi bi-robot fs-1 text-primary mb-2"></i>
                    <h4 class="mb-1">PF AI</h4>
                    <p class="text-muted small">Your AI-Powered Financial Coach</p>
                </div>
                
                <form id="login-form" action="/auth/login" method="POST">
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" name="email" required placeholder="you@example.com">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" name="password" required placeholder="••••••••">
                    </div>
                    <div class="d-grid mb-3">
                        <button type="submit" class="btn btn-primary">Sign In</button>
                    </div>
                    <div class="text-center">
                        <a href="/auth/forgot-password" class="text-decoration-none small">Forgot password?</a>
                    </div>
                </form>
                
                <hr class="my-4">
                <div class="text-center">
                    <p class="text-muted small mb-2">Don't have an account?</p>
                    <a href="/auth/register" class="btn btn-outline-primary btn-sm">Create Account</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
