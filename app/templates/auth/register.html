{% extends "base.html" %}

{% block title %}Register - PF AI{% endblock %}
{% block page_title %}Create Account{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center min-vh-100">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow-lg">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <i class="bi bi-robot fs-1 text-primary mb-2"></i>
                    <h4 class="mb-1">Create Your Account</h4>
                    <p class="text-muted small">Start your journey to financial intelligence</p>
                </div>
                
                <form id="register-form" action="/auth/register" method="POST">
                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="form-label">First Name</label>
                            <input type="text" class="form-control" name="first_name" required>
                        </div>
                        <div class="col-6 mb-3">
                            <label class="form-label">Last Name</label>
                            <input type="text" class="form-control" name="last_name" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" name="email" required placeholder="you@example.com">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" name="password" required minlength="8" placeholder="Min 8 characters">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Confirm Password</label>
                        <input type="password" class="form-control" name="password_confirm" required minlength="8">
                    </div>
                    <div class="d-grid mb-3">
                        <button type="submit" class="btn btn-primary">Create Account</button>
                    </div>
                </form>
                
                <hr class="my-4">
                <div class="text-center">
                    <p class="text-muted small mb-2">Already have an account?</p>
                    <a href="/auth/login" class="btn btn-outline-primary btn-sm">Sign In</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
