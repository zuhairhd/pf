[pytest]
testpaths = app/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -q
markers =
    integration: Database-touching integration tests
    unit: Pure unit tests
    e2e: End-to-end tests
    rls: Tests that validate PostgreSQL Row-Level Security
    slow: Tests that may take more than a few seconds
    smoke: Quick health and sanity checks
